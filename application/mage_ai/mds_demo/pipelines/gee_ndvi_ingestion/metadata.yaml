description: 'Fetch NDVI zonal statistics per Vietnamese ward from Google Earth Engine
  (MODIS/061/MOD13Q1, 16-day composites, 250 m). Ward boundaries are loaded from stg.vn_gis_new_ward,
  reduced over GEE per province per image date, and written to MinIO as Hive-partitioned
  parquet. Incremental by default: only dates after the watermark in stg.gee__ndvi
  are fetched. Run with start_date/end_date for historical backfill.

  Auth: place GEE service account JSON at application/mage_ai/gee_service_account.json
  before running. '
