description: 'Fetch SERVIR-Mekong RLCMS annual land-cover classification per Vietnamese
  ward from Google Earth Engine (30 m resolution). Ward boundaries are loaded from
  stg.vn_gis_new_ward; a frequency histogram reducer computes pixel counts per class
  per ward per year. Output is long-format parquet (one row per ward × class) written
  to MinIO partitioned by year. Incremental by default: only years after the stg.gee__rlcms
  watermark are fetched.

  Auth: place GEE service account JSON at application/mage_ai/google_service_account.json.
  Verify the RLCMS collection ID and class codes against the GEE asset catalog before
  running — collection: projects/servir-mekong/rlcms/landcover. '
