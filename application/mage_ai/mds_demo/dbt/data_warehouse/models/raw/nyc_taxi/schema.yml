version: 2

models:
  - name: raw_nyc_taxi__trips
    description: >
      External view reading raw NYC TLC trip records from the MinIO landing area
      via pg_duckdb. One row per trip as ingested by the Mage AI pipeline.
    columns:
      - name: vendor_id
        description: TLC vendor identifier (1=Creative Mobile, 2=VeriFone)
      - name: taxi_type
        description: Taxi fleet type — yellow, green, fhv, or fhvhv
      - name: year
        description: Trip year (partition column added by ingestion pipeline)
      - name: month
        description: Trip month (partition column added by ingestion pipeline)
      - name: pickup_datetime
        description: Date and time when the meter was engaged
      - name: dropoff_datetime
        description: Date and time when the meter was disengaged
      - name: passenger_count
        description: Number of passengers; driver-entered value
      - name: trip_distance
        description: Elapsed trip distance in miles reported by the taximeter
      - name: rate_code_id
        description: >
          Final rate code in effect at the end of the trip.
          1=Standard, 2=JFK, 3=Newark, 4=Nassau/Westchester, 5=Negotiated, 6=Group ride
      - name: store_and_fwd_flag
        description: Whether trip record was held in vehicle before server send (Y/N)
      - name: pu_location_id
        description: TLC Taxi Zone where the meter was engaged
      - name: do_location_id
        description: TLC Taxi Zone where the meter was disengaged
      - name: payment_type
        description: How the passenger paid — 1=Credit, 2=Cash, 3=No charge, 4=Dispute
      - name: fare_amount
        description: Meter fare calculated by time-and-distance algorithm
      - name: extra
        description: Miscellaneous extras and surcharges
      - name: mta_tax
        description: $0.50 MTA tax triggered based on metered rate
      - name: tip_amount
        description: Tip amount (auto-populated for credit card tips)
      - name: tolls_amount
        description: Total of all tolls paid during trip
      - name: improvement_surcharge
        description: $0.30 improvement surcharge assessed at flag drop
      - name: total_amount
        description: Total amount charged to passengers (excludes cash tips)
      - name: congestion_surcharge
        description: Congestion surcharge for trips in/through Manhattan south of 96th St
      - name: airport_fee
        description: $1.25 airport fee for pickup at LaGuardia or JFK
      - name: _filename
        description: Full S3 path of the source Parquet file
