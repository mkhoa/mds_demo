version: 2

models:
  - name: raw_vn_weather__daily
    description: >
      External view reading historical daily weather data from MinIO landing area
      via pg_duckdb. One row per ward per day. Source: Open-Meteo Archive API,
      extracted by the vn_weather_historical Mage pipeline. Variables scoped to
      agriculture and crop analysis inputs.
    columns:
      - name: date
        description: Observation date (system timezone)
      - name: ma_xa
        description: Ward/commune code
      - name: ten_xa
        description: Ward/commune name
      - name: ma_tinh
        description: Province/city code
      - name: ten_tinh
        description: Province/city name
      - name: lat
        description: Centroid latitude of the ward boundary
      - name: long
        description: Centroid longitude of the ward boundary
      - name: weather_code
        description: WMO weather interpretation code
      - name: temperature_2m_max
        description: Maximum daily air temperature at 2m (°C)
      - name: temperature_2m_min
        description: Minimum daily air temperature at 2m (°C)
      - name: temperature_2m_mean
        description: Mean daily air temperature at 2m (°C)
      - name: precipitation_sum
        description: Total daily precipitation (mm)
      - name: rain_sum
        description: Total daily rainfall (mm)
      - name: sunshine_duration
        description: Duration of sunshine (seconds)
      - name: shortwave_radiation_sum
        description: Total daily shortwave solar radiation (MJ/m²)
      - name: wind_speed_10m_max
        description: Maximum daily wind speed at 10m (km/h)
      - name: et0_fao_evapotranspiration
        description: Reference evapotranspiration per FAO-56 Penman-Monteith (mm)
      - name: year
        description: Partition year (extracted from hive path)
      - name: month
        description: Partition month (extracted from hive path)
      - name: day
        description: Partition day (extracted from hive path)
      - name: _filename
        description: Full S3 path of the source Parquet file
