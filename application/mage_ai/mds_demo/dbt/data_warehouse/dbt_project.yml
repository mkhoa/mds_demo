name: 'data_warehouse'
version: '1.0.0'
config-version: 2

profile: 'data_warehouse'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

on-run-start:
  - "{{ setup_minio_secret() }}"

models:
  data_warehouse:
    raw:
      +materialized: view
      +schema: raw

    stg:
      +materialized: table
      +schema: stg

    bdh:
      +materialized: table
      +schema: bdh

    adl:
      +materialized: table
      +schema: adl
